<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trivenzaa — Crafted with Heart, Powered by Purpose</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
    <script>
      // Restore SPA route encoded by 404.html
      (function () {
        var params = new URLSearchParams(window.location.search)
        var p = params.get('p')
        if (p) {
          var q = params.get('q')
          var path = '/' + p.replace(/^\//, '').replace(/~and~/g, '&')
          var search = q ? '?' + q.replace(/~and~/g, '&') : ''
          window.history.replaceState(
            null, null,
            window.location.pathname.replace(/\/$/, '') + path + search + window.location.hash
          )
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

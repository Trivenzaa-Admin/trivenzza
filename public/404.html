<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trivenzaa</title>
    <script>
      // Redirect SPA routes through the query string so GitHub Pages
      // serves index.html instead of a real 404.
      // segmentCount = 1 because the repo lives at /trivenzza/
      var segmentCount = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
